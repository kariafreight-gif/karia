<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#080E1A"/>
<title>كرية — لوحة التحكم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#080E1A;--nav:#060B14;--card:#0D1525;--card2:#111C30;--border:#182540;
  --rust:#C0392B;--gold:#D4A017;--green:#27AE60;--blue:#2980B9;--smoke:#7A8FAA;--white:#F0F4FA;
  --amber:#E67E22;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Cairo',sans-serif;color:var(--white);min-height:100vh}

/* Layout */
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{
  width:220px;background:var(--nav);border-left:1px solid var(--border);
  padding:20px 0;display:flex;flex-direction:column;position:fixed;height:100vh;right:0;z-index:100
}

.sidebar-logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:16px}
.sidebar-logo h1{font-size:22px;font-weight:900}
.sidebar-logo span{color:var(--rust)}
.sidebar-logo p{font-size:11px;color:var(--smoke)}

.nav-item{
  display:flex;align-items:center;gap:10px;padding:12px 20px;
  cursor:pointer;color:var(--smoke);border-right:3px solid transparent
}
.nav-item:hover{background:var(--card);color:var(--white)}
.nav-item.active{background:var(--card);color:var(--white);border-right-color:var(--rust)}

.main{margin-right:220px;padding:24px;width:calc(100% - 220px)}

/* Card */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}

/* Topbar */
.topbar{display:flex;justify-content:space-between;margin-bottom:20px}
.topbar p{color:var(--smoke)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
.kpi-val{font-size:26px;font-weight:900}
.kpi-lbl{color:var(--smoke);font-size:12px}

/* Tables */
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--border);text-align:right}
th{color:var(--smoke);font-size:12px}

/* Screen */
.screen{display:none}
.screen.active{display:block}

/* Mobile */
@media(max-width:768px){
.sidebar{display:none}
.main{margin:0;width:100%}
.mobile-nav{display:flex}
}

.mobile-nav{
  display:none;position:fixed;bottom:0;width:100%;
  background:var(--nav);border-top:1px solid var(--border);
  justify-content:space-around;padding:10px 0
}

.mnav-btn{
  background:none;border:none;color:var(--smoke);
  display:flex;flex-direction:column;align-items:center;
  font-family:'Cairo',sans-serif
}
.mnav-btn.active{color:var(--rust)}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  databaseURL: "YOUR_DB_URL"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

</head>

<body>

<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">
    <h1>كرية <span>•</span></h1>
    <p>لوحة التحكم</p>
  </div>

  <div class="nav-item active" onclick="showPage('dashboard',this)">📊 لوحة التحكم</div>
  <div class="nav-item" onclick="showPage('orders',this)">📦 الطلبات</div>
</div>

<!-- Main -->
<div class="main">

<!-- Dashboard -->
<div id="p-dashboard" class="screen active">
  <div class="topbar">
    <h2>لوحة التحكم</h2>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-val" id="kpi-trips">0</div><div class="kpi-lbl">رحلات</div></div>
    <div class="kpi"><div class="kpi-val" id="kpi-active">0</div><div class="kpi-lbl">نشطة</div></div>
    <div class="kpi"><div class="kpi-val" id="kpi-revenue">0</div><div class="kpi-lbl">إيراد</div></div>
    <div class="kpi"><div class="kpi-val" id="kpi-waiting">0</div><div class="kpi-lbl">بانتظار</div></div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>#</th><th>من</th><th>إلى</th><th>الحالة</th><th>السعر</th>
        </tr>
      </thead>
      <tbody id="orders-table"></tbody>
    </table>
  </div>
</div>

<!-- Orders -->
<div id="p-orders" class="screen">
  <h2>📦 الطلبات</h2>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>#</th><th>من</th><th>إلى</th><th>الحالة</th><th>السعر</th>
        </tr>
      </thead>
      <tbody id="orders-full"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<!-- Mobile Nav -->
<div class="mobile-nav">
  <button class="mnav-btn active" onclick="mTab('dashboard',this)">📊</button>
  <button class="mnav-btn" onclick="mTab('orders',this)">📦</button>
</div>

<script>
// Navigation
function showPage(id,el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
}

function mTab(id,el){
  showPage(id);
  document.querySelectorAll('.mnav-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

// Firebase live data
db.ref('orders').on('value', snapshot=>{
  let orders=[];
  snapshot.forEach(child=>{
    orders.push({id:child.key,...child.val()});
  });

  let trips=orders.length;
  let active=orders.filter(o=>o.status==='جارية').length;
  let waiting=orders.filter(o=>o.status==='بانتظار').length;
  let revenue=orders.reduce((sum,o)=>sum+(Number(o.price)||0),0);

  document.getElementById('kpi-trips').textContent=trips;
  document.getElementById('kpi-active').textContent=active;
  document.getElementById('kpi-waiting').textContent=waiting;
  document.getElementById('kpi-revenue').textContent=revenue;

  const rows=orders.map(o=>`
    <tr>
      <td>${o.id.slice(-5)}</td>
      <td>${o.from||'-'}</td>
      <td>${o.to||'-'}</td>
      <td>${o.status||'-'}</td>
      <td>${o.price||'-'}</td>
    </tr>`).join('');

  document.getElementById('orders-table').innerHTML=rows;
  document.getElementById('orders-full').innerHTML=rows;
});
</script>

</body>
</html>
