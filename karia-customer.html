<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>كرية — تطبيق الزبون</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0D1B2A;--nav:#0A1520;--card:#111E2E;--border:#1E3048;
  --rust:#C0392B;--gold:#D4A017;--green:#27AE60;--smoke:#8A9BB0;--white:#FDFAF4;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  font-family:'Cairo',sans-serif;
  color:var(--white);
  max-width:430px;
  margin:auto;
}

/* HEADER */
.header{
  background:var(--nav);
  border-bottom:1px solid var(--border);
  padding:14px;
  display:flex;
  justify-content:space-between;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  margin:10px;
}

/* BUTTON */
.btn{
  background:var(--rust);
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
}

/* INPUT */
.field{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg);
  color:white;
  margin-bottom:10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"YOUR_KEY",
  databaseURL:"https://your-db.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let selTruckId=null;

const trucks={
  pickup:{label:'بيك أب 🛻',price:35},
  small:{label:'شاحنة صغيرة 🚚',price:65},
  medium:{label:'شاحنة متوسطة 🚛',price:110}
};

function selectTruck(id){
  selTruckId=id;
}

function confirmOrder(){
  if(!selTruckId){
    alert('اختر نوع المركبة');
    return;
  }

  const order={
    from:document.getElementById('from').value,
    to:document.getElementById('to').value,
    truck:trucks[selTruckId].label,
    price:trucks[selTruckId].price,
    phone:document.getElementById('phone').value,
    goods:document.getElementById('goods').value,
    status:'بانتظار',
    createdAt:Date.now()
  };

  db.ref('orders').push(order);

  alert('تم إرسال الطلب');
}
</script>

</head>

<body>

<div class="header">
  <h3>كرية 🚚</h3>
</div>

<div class="card">
  <label>من</label>
  <input id="from" class="field"/>

  <label>إلى</label>
  <input id="to" class="field"/>
</div>

<div class="card">
  <button class="btn" onclick="selectTruck('pickup')">🛻 بيك أب (35)</button>
  <button class="btn" onclick="selectTruck('small')">🚚 صغيرة (65)</button>
  <button class="btn" onclick="selectTruck('medium')">🚛 متوسطة (110)</button>
</div>

<div class="card">
  <input id="goods" class="field" placeholder="وصف البضاعة"/>
  <input id="phone" class="field" placeholder="رقم الهاتف"/>
</div>

<div class="card">
  <button class="btn" onclick="confirmOrder()">تأكيد الطلب</button>
</div>

</body>
</html>
