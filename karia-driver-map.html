<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>كرية | السائق</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0b0d10;
  --panel:#14181d;
  --panel-2:#1c2127;
  --ink:#f4f1ea;
  --muted:#8a8f96;
  --gold:#e0a64a;
  --gold-2:#f6c674;
  --green:#2ecc71;
  --red:#e74c3c;
  --line:rgba(255,255,255,0.06);
}

html,body{
  height:100%;
  width:100%;
  background:var(--bg);
  color:var(--ink);
  font-family:'Cairo',sans-serif;
  overflow:hidden;
}

/* MAP */
#map{
  position:absolute;
  inset:0;
  z-index:1;
}

/* fix leaflet inversion issues */
.leaflet-tile-pane{
  filter:invert(1) hue-rotate(180deg) brightness(0.95) contrast(0.9);
}
.leaflet-marker-icon,
.leaflet-marker-shadow{
  filter:none !important;
}

/* TOP BAR */
.top-bar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:1000;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);
}

.brand{
  display:flex;
  gap:8px;
  align-items:center;
  font-weight:900;
}

.brand-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--gold);
}

.brand-text{color:var(--gold-2)}

.status-pill{
  display:flex;
  gap:8px;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:var(--panel);
  border:1px solid var(--line);
  font-size:13px;
}

.status-pill.online{color:var(--green)}
.status-pill.offline{color:var(--red)}

.pulse{
  width:8px;height:8px;
  border-radius:50%;
  background:currentColor;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.3);opacity:.4}
}

/* GPS INFO */
.gps-info{
  position:absolute;
  top:70px;
  right:16px;
  z-index:1000;
  background:rgba(20,24,29,0.9);
  padding:8px 10px;
  border-radius:10px;
  font-size:12px;
  border:1px solid var(--line);
}

/* BUTTON */
.recenter-btn{
  position:absolute;
  bottom:220px;
  right:16px;
  z-index:1000;
  width:48px;
  height:48px;
  border-radius:12px;
  background:var(--panel);
  border:1px solid var(--line);
  color:var(--gold);
}

/* BOTTOM PANEL */
.bottom-panel{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  z-index:1000;
  background:var(--panel);
  border-top:1px solid var(--line);
  padding:16px;
}

.metrics{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.metric{
  background:var(--panel-2);
  padding:10px;
  border-radius:12px;
  border:1px solid var(--line);
}

.metric-value{
  font-size:20px;
  font-weight:900;
}

.metric-label{
  font-size:11px;
  color:var(--muted);
}

.track-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:800;
  background:var(--gold);
  color:#000;
}

.track-btn.active{
  background:var(--red);
  color:#fff;
}

/* DRIVER MARKER */
.driver-marker{
  width:38px;
  height:38px;
  border-radius:50%;
  background:var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#000;
  border:3px solid #111;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="top-bar">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-text">كرية</div>
  </div>

  <div class="status-pill online" id="status">
    <span class="pulse"></span>
    متصل
  </div>
</div>

<div class="gps-info">
  GPS: <b id="acc">--</b> م
</div>

<button class="recenter-btn" id="center">⌖</button>

<div class="bottom-panel">
  <div class="metrics">
    <div class="metric">
      <div class="metric-label">السرعة</div>
      <div class="metric-value"><span id="speed">0</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">المسافة</div>
      <div class="metric-value"><span id="dist">0</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">الوقت</div>
      <div class="metric-value" id="time">00:00</div>
    </div>
  </div>

  <button class="track-btn" id="track">بدء الرحلة</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([32.8872,13.1913],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

const icon = L.divIcon({
  className:"",
  html:`<div class="driver-marker">🚚</div>`
});

let marker = null;
let watchId = null;
let tracking = false;
let path = [];
let line = null;
let distance = 0;
let start = null;

function hav(a,b){
  const R=6371;
  const d1=(b[0]-a[0])*Math.PI/180;
  const d2=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(d1/2)**2+
  Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*
  Math.sin(d2/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function update(pos){
  const p=[pos.coords.latitude,pos.coords.longitude];

  document.getElementById("acc").textContent=Math.round(pos.coords.accuracy);

  if(!marker){
    marker=L.marker(p,{icon}).addTo(map);
    map.setView(p,16);
  }else{
    marker.setLatLng(p);
  }

  if(tracking){
    if(path.length>0){
      distance+=hav(path[path.length-1],p);
      document.getElementById("dist").textContent=distance.toFixed(2);
    }
    path.push(p);

    if(!line){
      line=L.polyline(path,{color:"#e0a64a"}).addTo(map);
    }else{
      line.setLatLngs(path);
    }
  }
}

function startGPS(){
  watchId=navigator.geolocation.watchPosition(update);
}

document.getElementById("track").onclick=()=>{
  tracking=!tracking;

  if(tracking){
    path=[];
    distance=0;
    start=Date.now();
    document.getElementById("track").classList.add("active");
    document.getElementById("track").textContent="إنهاء الرحلة";
  }else{
    document.getElementById("track").classList.remove("active");
    document.getElementById("track").textContent="بدء الرحلة";
  }
};

document.getElementById("center").onclick=()=>{
  if(marker){
    map.setView(marker.getLatLng(),16);
  }
};

startGPS();
</script>

</body>
</html>
