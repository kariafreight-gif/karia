<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0A1F0A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="كرية | سائق"/>
<title>كرية — تطبيق السائق</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0A1A0A;--nav:#071407;--card:#112011;--border:#1E3B1E;
  --green:#27AE60;--gold:#D4A017;--rust:#C0392B;--smoke:#7A9B7A;--white:#F4FAF4;
  --amber:#E67E22;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  background:var(--bg);
  font-family:'Cairo',sans-serif;
  color:var(--white);
  min-height:100vh;
  max-width:430px;
  margin:0 auto;
  direction:rtl;
  overflow-x:hidden;
}

.header{
  background:var(--nav);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
}

.header h1{font-size:20px;font-weight:900}
.header h1 span{color:var(--green)}
.header p{font-size:11px;color:var(--smoke);margin-top:2px}

.screen{display:none;padding:16px 20px 100px}
.screen.active{display:block}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:14px
}

/* toggle */
.status-toggle{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:20px;
  text-align:center;
  margin-bottom:20px
}

.big-toggle{
  width:80px;height:80px;border-radius:50%;
  border:none;font-size:32px;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}

.big-toggle.online{background:var(--green)}
.big-toggle.offline{background:#1E3B1E}

.toggle-status.on{color:var(--green)}
.toggle-status.off{color:var(--smoke)}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:20px
}

.stat-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  text-align:center
}

.stat-val{font-size:24px;font-weight:900;color:var(--gold)}
.stat-lbl{color:var(--smoke);font-size:11px}

.incoming{
  border:2px solid var(--green);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px
}

.inc-btns{display:flex;gap:10px}

.btn-accept{
  flex:2;
  background:var(--green);
  color:white;
  border:none;
  border-radius:14px;
  padding:14px;
  font-weight:700;
  cursor:pointer;
}

.btn-reject{
  flex:1;
  border:1px solid var(--rust);
  background:transparent;
  color:var(--rust);
  border-radius:14px;
  padding:14px;
  cursor:pointer;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:430px;
  background:var(--nav);
  border-top:1px solid var(--border);
  display:flex;
  justify-content:space-around;
  padding:10px 0 20px;
}

.nav-btn{
  background:transparent;
  border:none;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
}

.nav-btn.active{color:var(--green)}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  databaseURL: "https://maria-26135-default-rtdb.europe-west1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let online=false;
let currentOrderKey=null;
let timer=null;

function toggleStatus(){
  online=!online;

  if(online){
    listenForOrders();
  }else{
    db.ref('orders').off();
    currentOrderKey=null;
  }
}

function listenForOrders(){
  db.ref('orders')
    .orderByChild('status')
    .equalTo('بانتظار')
    .limitToLast(1)
    .on('child_added',(snap)=>{

      if(!online || currentOrderKey) return;

      const order=snap.val();
      currentOrderKey=snap.key;

      document.getElementById('inc-order').style.display='block';

      startTimer();
    });
}

function startTimer(){
  let t=30;
  timer=setInterval(()=>{
    t--;
    if(t<=0){
      clearInterval(timer);
      rejectOrder();
    }
  },1000);
}

function acceptOrder(){
  clearInterval(timer);

  if(currentOrderKey){
    db.ref('orders/'+currentOrderKey).update({
      status:'جارية',
      driver:'driver_001'
    });
  }
}

function rejectOrder(){
  clearInterval(timer);
  currentOrderKey=null;
  document.getElementById('inc-order').style.display='none';
}
</script>

</head>

<body>

<div class="header">
  <h1>كرية <span>•</span></h1>
</div>

<div class="screen active">
  <div class="status-toggle">
    <button class="big-toggle offline" onclick="toggleStatus()">🔌</button>
    <div>الحالة</div>
  </div>

  <div id="inc-order" class="incoming" style="display:none">
    <p>طلب جديد</p>
    <div class="inc-btns">
      <button class="btn-reject" onclick="rejectOrder()">رفض</button>
      <button class="btn-accept" onclick="acceptOrder()">قبول</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active">🏠</button>
  <button class="nav-btn">🚛</button>
  <button class="nav-btn">💰</button>
  <button class="nav-btn">👤</button>
</div>

</body>
</html>
